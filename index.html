<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PhotoEasy — Browser Photo Editor</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="styles.css?v=20260716-9">
  <script>
    // Stored theme is applied before first paint so the editor never flashes.
    // Storage throws on file:// and in private mode; the system theme is a fine
    // fallback, so a failure here must not block the rest of the page.
    (function () {
      try {
        const stored = localStorage.getItem('theme');
        if (stored) document.documentElement.dataset.theme = stored;
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="toolbar">
    <div class="editor-brand" aria-label="PhotoEasy editor" data-i18n-aria="brand.aria">
      <span class="editor-brand-name">PhotoEasy</span>
      <span class="editor-brand-context" data-i18n="brand.context">— editor</span>
    </div>
    <div class="toolbar-rule" aria-hidden="true"></div>
    <div class="actions">
      <button id="undo" data-i18n="header.undo">Undo</button>
      <button id="redo" data-i18n="header.redo">Redo</button>
      <button id="import-image" data-i18n="header.import">Import</button>
      <label class="import-resize-label">
        <input id="import-resize" type="checkbox" />
        <span data-i18n="header.matchCanvas">Match canvas to image</span>
      </label>
      <button id="export" data-i18n="header.export">Export PNG</button>
      <button id="resize-canvas" data-i18n="header.resize">Resize Canvas</button>
      <div class="zoom-controls" aria-label="Zoom controls" data-i18n-aria="header.zoomControls">
        <button id="zoom-fit" data-i18n="header.fit">Fit</button>
        <button id="zoom-100" data-i18n="header.actual">100%</button>
        <button id="zoom-out" data-i18n-aria="header.zoomOut">-</button>
        <div id="zoom-readout" class="zoom-readout" aria-live="polite">100%</div>
        <button id="zoom-in" data-i18n-aria="header.zoomIn">+</button>
      </div>
    </div>
    <div id="language-switch" class="language-switch" role="group" aria-label="Language" data-i18n-aria="header.lang">
      <button type="button" data-lang="en" title="English" data-i18n-title="header.lang.en">EN</button>
      <button type="button" data-lang="tr" title="Turkish" data-i18n-title="header.lang.tr">TR</button>
    </div>
    <button id="theme" class="theme" type="button" title="Toggle theme" data-i18n-title="header.theme" data-i18n-aria="header.theme">
      <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4" />
        <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" />
      </svg>
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" />
      </svg>
    </button>
    <div class="tool-header-controls">
      <!-- moved to tool properties panel -->
    </div>
    <div id="canvas-size" class="canvas-size" aria-hidden="true"></div>
  </header>

  <main class="main">
    <aside class="left-tools" aria-label="Tools" data-i18n-aria="tools.aria">
      <button id="tool-move" class="tool active" title="Move" aria-label="Move" data-tool-key="move">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3l15 9-5 2 2 7-12-18z" fill="currentColor"/></svg>
      </button>
      <button id="tool-brush" class="tool" title="Brush" aria-label="Brush" data-tool-key="brush">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 16c-1 1-1 3 0 4s3 1 4 0l7-7c1-1 1-3 0-4s-3-1-4 0L7 16z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="tool-eraser" class="tool" title="Eraser" aria-label="Eraser" data-tool-key="eraser">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 7l-3-3a2 2 0 0 0-3 0L7 11l6 6 7-7z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="tool-fill" class="tool" title="Fill" aria-label="Fill" data-tool-key="fill">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 21c0 .55.45 1 1 1h18c.55 0 1-.45 1-1v-2c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v2z" fill="currentColor" opacity="0.06"/>
          <path d="M7.5 7.5l9 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18 4l-3 3L9 3 6 6l6 6 3-3v-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M15 19c0 .83-.67 1.5-1.5 1.5S12 19.83 12 19s1.5-2 1.5-2 1.5 1.17 1.5 2z" fill="currentColor"/>
        </svg>
      </button>
      <button id="tool-crop" class="tool" title="Crop" aria-label="Crop" data-tool-key="crop">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 2v4M2 6h4M18 22v-4M22 18h-4M6 22h12V10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="tool-select" class="tool" title="Select" aria-label="Select" data-tool-key="select">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 2"/></svg>
      </button>
      <button id="tool-magic" class="tool" title="Magic Wand" aria-label="Magic Wand" data-tool-key="magic">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 12l4-4 4 4 4-4 4 4V6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 18l12-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="tool-transform" class="tool" title="Transform" aria-label="Transform" data-tool-key="transform">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 7h18v10H3z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 7v-3M17 7v-3M12 7v-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="17" r="1" fill="currentColor"/><circle cx="12" cy="17" r="1" fill="currentColor"/><circle cx="17" cy="17" r="1" fill="currentColor"/></svg>
      </button>
      <button id="tool-zoom" class="tool" title="Zoom" aria-label="Zoom" data-tool-key="zoom">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="11" cy="11" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M20 20l-4.2-4.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M11 8v6M8 11h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <button id="tool-text" class="tool" title="Text" aria-label="Text" data-tool-key="text">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 6h16M8 18h8M12 6v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <!-- tool-controls moved to layers panel -->
    </aside>

    <section class="canvas-area">
      <div id="viewport" class="viewport">
        <div id="canvas-onboarding" class="canvas-onboarding" aria-live="polite">
          <strong data-i18n="onboarding.title">Import an image or add a layer to start.</strong>
          <span data-i18n="onboarding.body">The editor is empty right now, so nothing is broken.</span>
        </div>
        <div id="viewport-inner" class="viewport-inner">
          <canvas id="view"></canvas>
        </div>
        <div id="canvas-hud" class="canvas-hud">
          <div id="tool-hint" class="tool-hint" aria-live="polite"></div>
          <div class="canvas-status-row">
            <div id="status-stack" class="status-stack" aria-live="polite" aria-atomic="true"></div>
          </div>
        </div>
      </div>
    </section>

    <aside id="sidebar" class="layers sidebar tool-primary" aria-label="Editing panels" data-i18n-aria="sidebar.aria">
      <div id="tool-props" class="tool-props sidebar-panel" aria-live="polite">
        <div class="tool-props-title" data-i18n="sidebar.toolProperties">Tool Properties</div>
        <div id="tool-props-content" class="tool-props-content"></div>
      </div>
      <div id="history-panel" class="history-panel sidebar-panel" aria-live="polite">
        <div class="history-panel-header">
          <div class="layers-title" data-i18n="sidebar.history">History</div>
          <div id="history-meta" class="history-meta">0 / 0</div>
        </div>
        <div id="history-list" class="history-list"></div>
      </div>
      <div id="layers-panel" class="layers-panel sidebar-panel">
        <div class="layers-header">
          <div class="layers-title" data-i18n="sidebar.layers">Layers</div>
          <div class="layers-header-top">
          <button id="add-layer" data-i18n="layers.add">Add Layer</button>
          <button id="dup-layer" data-i18n="layers.duplicate">Duplicate Layer</button>
          <button id="del-layer" data-i18n="layers.remove">Remove Layer</button>
          </div>
        </div>
        <ul id="layers-list"></ul>
      </div>
    </aside>
  </main>

  <input id="file-input" type="file" accept="image/*" style="display:none">
  
  <!-- Resize Canvas Modal -->
  <div id="resize-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="resize-modal-title" aria-hidden="true">
    <div class="modal-content" tabindex="-1">
      <div class="modal-header">
        <h3 id="resize-modal-title" data-i18n="modal.resize.title">Resize Canvas</h3>
        <button id="close-resize-modal" class="close-modal" aria-label="Close resize canvas dialog" data-i18n-aria="modal.resize.close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="new-width" data-i18n="modal.resize.width">Width (px):</label>
          <input type="number" id="new-width" min="1" max="16384" value="1200">
        </div>
        <div class="form-group">
          <label for="new-height" data-i18n="modal.resize.height">Height (px):</label>
          <input type="number" id="new-height" min="1" max="16384" value="700">
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" id="maintain-aspect"> <span data-i18n="modal.resize.aspect">Maintain aspect ratio</span>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button id="cancel-resize" class="btn-secondary" data-i18n="common.cancel">Cancel</button>
        <button id="confirm-resize" class="btn-primary" data-i18n="common.resize">Resize</button>
      </div>
    </div>
  </div>
  
  <script defer src="js/00-i18n.js?v=20260716-9"></script>
  <script defer src="js/00-theme.js?v=20260716-9"></script>
  <script defer src="js/00-core.js?v=20260716-9"></script>
  <script defer src="js/10-history.js?v=20260716-9"></script>
  <script defer src="js/20-layers-compositor.js?v=20260716-9"></script>
  <script defer src="js/30-editor-input.js?v=20260716-9"></script>
  <script defer src="js/40-tools-ui.js?v=20260716-9"></script>
  <script defer src="js/50-fill.js?v=20260716-9"></script>
  <script defer src="js/60-document-io.js?v=20260716-9"></script>
  <script defer src="js/70-transform-crop.js?v=20260716-9"></script>
  <script defer src="js/80-viewport-init.js?v=20260716-9"></script>
</body>
</html>
