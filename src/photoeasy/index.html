<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PhotoEasy — Browser Photoshop Clone (Demo)</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="toolbar">
    <div class="actions">
      <button id="undo">Undo</button>
      <button id="redo">Redo</button>
      <button id="import-image">Import</button>
      <button id="export">Export PNG</button>
    </div>
    <div class="tool-header-controls">
      <!-- moved to tool properties panel -->
    </div>
  </header>

  <main class="main">
    <aside class="left-tools" aria-label="Tools">
      <button id="tool-move" class="tool active" title="Move" aria-label="Move">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 3l15 9-5 2 2 7-12-18z" fill="currentColor"/></svg>
      </button>
      <button id="tool-brush" class="tool" title="Brush" aria-label="Brush">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 16c-1 1-1 3 0 4s3 1 4 0l7-7c1-1 1-3 0-4s-3-1-4 0L7 16z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="tool-eraser" class="tool" title="Eraser" aria-label="Eraser">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 7l-3-3a2 2 0 0 0-3 0L7 11l6 6 7-7z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="tool-fill" class="tool" title="Fill" aria-label="Fill">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 21c0 .55.45 1 1 1h18c.55 0 1-.45 1-1v-2c0-.55-.45-1-1-1H3c-.55 0-1 .45-1 1v2z" fill="currentColor" opacity="0.06"/>
          <path d="M7.5 7.5l9 9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M18 4l-3 3L9 3 6 6l6 6 3-3v-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M15 19c0 .83-.67 1.5-1.5 1.5S12 19.83 12 19s1.5-2 1.5-2 1.5 1.17 1.5 2z" fill="currentColor"/>
        </svg>
      </button>
      <button id="tool-crop" class="tool" title="Crop" aria-label="Crop">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 2v4M2 6h4M18 22v-4M22 18h-4M6 22h12V10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="tool-select" class="tool" title="Select" aria-label="Select">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 2"/></svg>
      </button>
      <button id="tool-magic" class="tool" title="Magic Wand" aria-label="Magic Wand">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 12l4-4 4 4 4-4 4 4V6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 18l12-6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button id="tool-transform" class="tool" title="Transform" aria-label="Transform">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M3 7h18v10H3z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 7v-3M17 7v-3M12 7v-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="17" r="1" fill="currentColor"/><circle cx="12" cy="17" r="1" fill="currentColor"/><circle cx="17" cy="17" r="1" fill="currentColor"/></svg>
      </button>
      <button id="tool-text" class="tool" title="Text" aria-label="Text">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 6h16M8 18h8M12 6v12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <!-- tool-controls moved to layers panel -->
    </aside>

    <section class="canvas-area">
      <div id="viewport" class="viewport">
        <canvas id="view"></canvas>
      </div>
    </section>

    <aside class="layers">
      <div id="tool-props" class="tool-props" aria-live="polite">
        <div class="tool-props-title">Tool Properties</div>
        <div id="tool-props-content" class="tool-props-content"></div>
      </div>
      <div class="layers-header">
        <div class="layers-title">Layers</div>
        <div class="layers-header-top">
          <button id="add-layer">Add Layer</button>
          <button id="del-layer">Remove Layer</button>
        </div>
      </div>
      <ul id="layers-list"></ul>
    </aside>
  </main>

  <input id="file-input" type="file" accept="image/*" style="display:none">
  <script src="app.js"></script>
</body>
</html>
